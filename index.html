<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CPP Debug Dojo</title>

<style>
:root {
  --border:#e2e2e2;
  --bg-dark:#0b1020;
  --fg-dark:#e7e7e7;
}

body{
  font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
  margin:20px;
  background:#fafafa;
}

.wrap{
  max-width:1100px;
  margin:auto;
}

h1{
  margin:0 0 6px;
}

.muted{ color:#666; }

.top{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin:14px 0 20px;
}

input,button{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{ cursor:pointer; }

.pill{
  padding:4px 10px;
  border-radius:999px;
  border:1px solid var(--border);
  font-size:12px;
}

.ok{ background:#eaffea; border-color:#66cc66; }
.bad{ background:#ffecec; border-color:#dd6666; }

.card{
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  background:white;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.grid{
  display:grid;
  grid-template-columns: minmax(0,1fr) 380px;
  gap:16px;
  margin-top:12px;
  align-items:start;
}

@media (max-width:950px){
  .grid{
    grid-template-columns: 1fr;
  }
}

textarea{
  width:100%;
  min-height:220px;
  resize:vertical;
  font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  font-size:13px;
  padding:14px;
  border-radius:12px;
  border:1px solid var(--border);
  box-sizing:border-box;
}

.panel{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.box{
  background:var(--bg-dark);
  color:var(--fg-dark);
  padding:12px;
  border-radius:14px;
  font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  font-size:12px;
  overflow:auto;
  max-height:140px;
  white-space:pre;
}

.results{
  background:var(--bg-dark);
  color:var(--fg-dark);
  padding:14px;
  border-radius:16px;
  white-space:pre-wrap;
  margin-top:10px;
}

small{ font-size:12px; color:#777; }
</style>
</head>
<body>

<div class="wrap">
<h1>CPP Debug Dojo</h1>
<div class="muted">Fix each snippet so output matches expected. Then press Submit.</div>

<div class="top">
<input id="email" type="email" placeholder="candidate email (optional)"/>
<button onclick="evaluateAll()">Submit</button>
<button onclick="copyJSON()">Copy JSON</button>
<span id="score" class="pill">Score: 0/10</span>
<span id="status" class="muted"></span>
</div>

<div id="challenges"></div>

<h3>Results</h3>
<div id="results" class="results">Submit to run…</div>
</div>

<script>
const API="https://ce.judge0.com";
let CPP_ID=54;

async function getLang(){
  try{
    const r=await fetch(API+"/languages");
    const j=await r.json();
    const c=j.find(x=>x.name.toLowerCase().includes("c++"));
    if(c) CPP_ID=c.id;
  }catch{}
}

async function run(code,expected,time=1){
  const body={
    source_code:code,
    language_id:CPP_ID,
    expected_output:expected,
    redirect_stderr_to_stdout:true,
    cpu_time_limit:time,
    wall_time_limit:time+2
  };

  const r=await fetch(API+"/submissions?wait=true&base64_encoded=false",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });

  return await r.json();
}

const challenges=[
{
id:1,
expected:"",
starter:`#include <cstdio>
int main(){
 int v=2;
 if(v==0,1)
   std::printf("run\\n");
}`
},
{
id:2,
expected:"same\n",
starter:`#include <cstdio>
int main(){
 char buf[]="hi";
 const char* s=buf;
 if(s=="hi")
   std::printf("same\\n");
}`
},
{
id:3,
expected:"",
starter:`#include <cstdio>
int main(){
 int x=42;
 if(0<x<10)
   std::printf("in range\\n");
}`
},
{
id:4,
expected:"",
starter:`#include <cstdio>
int main(){
 int ok=0;
 if(ok=1)
   std::printf("ok\\n");
}`
},
{
id:5,
expected:"",
starter:`#include <cstdio>
int main(){
 int isAdmin=0;
 if(isAdmin)
   std::printf("allowed\\n");
   std::printf("logged\\n");
}`
},
{
id:6,
expected:"100\n",
starter:`#include <cstdio>
#include <cstdlib>
int main(){
 size_t n=100;
 int* a=(int*)std::malloc(n*sizeof(int));
 std::printf("%zu\\n",sizeof(a));
 std::free(a);
}`
},
{
id:7,
expected:"1\n",
starter:`#include <cstdio>
#include <cstring>
int main(){
 int arr[4];
 std::memset(arr,1,sizeof(arr));
 std::printf("%d\\n",arr[0]);
}`
},
{
id:8,
expected:"42\n",
starter:`#include <cstdio>
int* f(){
 int x=42;
 return &x;
}
int main(){
 int* p=f();
 std::printf("%d\\n",*p);
}`
},
{
id:9,
expected:"0\n",
starter:`#include <cstdio>
int main(){
 int v[]={2,4,6,8};
 int n=4;
 for(int i=0;i<n;i++){
   if(v[i]%2==0){
     for(int j=i;j<n-1;j++)
       v[j]=v[j+1];
     n--;
     i++;
   }
 }
 std::printf("%d\\n",n);
}`
},
{
id:10,
expected:"3\n2\n1\n",
starter:`#include <cstdio>
#include <cstddef>
int main(){
 int v[]={1,2,3};
 size_t n=sizeof(v)/sizeof(v[0]);
 for(size_t i=n-1;i>=0;--i)
   std::printf("%d\\n",v[i]);
}`
}
];

function render(){
 const root=document.getElementById("challenges");
 root.innerHTML="";
 challenges.forEach(c=>{
   const div=document.createElement("div");
   div.className="card";
   div.innerHTML=`
   <div class="row">
     <div><b>${c.id}.)</b></div>
     <span id="badge-${c.id}" class="pill">Not run</span>
   </div>
   <div class="grid">
     <textarea id="code-${c.id}">${c.starter}</textarea>
     <div class="panel">
       <div><small>Expected output</small></div>
       <div class="box">${c.expected || "(empty)"}</div>
       <div><small>Last run output</small></div>
       <div class="box" id="out-${c.id}">—</div>
     </div>
   </div>
   `;
   root.appendChild(div);
 });
}

async function evaluateAll(){
 document.getElementById("status").textContent="Running...";
 await getLang();
 let pass=0;
 const results=[];

 for(const c of challenges){
   const code=document.getElementById("code-"+c.id).value;
   const badge=document.getElementById("badge-"+c.id);
   badge.textContent="Running...";
   const r=await run(code,c.expected);
   const ok=r.status.description==="Accepted";
   if(ok) pass++;
   badge.textContent=ok?"PASS":"FAIL";
   badge.className="pill "+(ok?"ok":"bad");
   document.getElementById("out-"+c.id).textContent=
     (r.stdout||"(empty)")+"\n\n"+(r.compile_output||"");
   results.push({id:c.id,status:r.status.description});
 }

 document.getElementById("score").textContent=`Score: ${pass}/10`;
 document.getElementById("results").textContent=
 JSON.stringify({
   email:document.getElementById("email").value||null,
   score:`${pass}/10`,
   results
 },null,2);

 document.getElementById("status").textContent="Done";
}

function copyJSON(){
 navigator.clipboard.writeText(
   document.getElementById("results").textContent
 );
}

render();
</script>

</body>
</html>
