<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>C Debug Dojo</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<style>
:root { --border:#e2e2e2; --bg-dark:#0b1020; --fg-dark:#e7e7e7; }
body{ font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; margin:20px; background:#fafafa; }
.wrap{ max-width:1100px; margin:auto; }
h1{ margin:0 0 6px; }
.muted{ color:#666; }
.top{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:14px 0 20px; }
input,button{ padding:10px 12px; border-radius:10px; border:1px solid var(--border); }
button{ cursor:pointer; }
.pill{ padding:4px 10px; border-radius:999px; border:1px solid var(--border); font-size:12px; }
.ok{ background:#eaffea; border-color:#66cc66; }
.bad{ background:#ffecec; border-color:#dd6666; }
.card{ border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px; background:white; }
.row{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
.grid{ display:grid; grid-template-columns:minmax(0,1fr) 400px; gap:16px; margin-top:12px; align-items:start; }
@media (max-width:980px){ .grid{ grid-template-columns: 1fr; } }
textarea{
  width:100%; min-height:220px; resize:vertical; box-sizing:border-box;
  font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  font-size:13px; padding:14px; border-radius:12px; border:1px solid var(--border);
}
.panel{ display:flex; flex-direction:column; gap:10px; }
.label{ font-size:12px; color:#777; }
.box{
  background:var(--bg-dark); color:var(--fg-dark);
  padding:12px; border-radius:14px;
  font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  font-size:12px; line-height:1.35;
  overflow:auto; max-height:160px; white-space:pre;
}
.results{
  background:var(--bg-dark); color:var(--fg-dark);
  padding:14px; border-radius:16px; white-space:pre-wrap; margin-top:10px;
}
small{ font-size:12px; color:#777; }
</style>
</head>
<body>

<div class="wrap">
  <h1>C Debug Dojo</h1>
  <div class="muted">Fix each snippet so output matches expected. Then press <b>Submit</b>. (Runs on Judge0 CE.)</div>

  <div class="top">
    <input id="email" type="email" placeholder="candidate email (optional)"/>
    <button id="submitBtn" onclick="evaluateAll()">Submit</button>
    <button onclick="copyJSON()">Copy JSON</button>
    <span id="score" class="pill">Score: 0/10</span>
    <span id="status" class="muted"></span>
  </div>

  <div id="challenges"></div>

  <h3>Results</h3>
  <div id="results" class="results">Submit to run…</div>
</div>

<script>
const API = "https://ce.judge0.com";
let C_ID = 50; // fallback (often: C (GCC 9.x) == 50; but we also auto-detect)

async function getCLangId(){
  try{
    const r = await fetch(API + "/languages", { cache: "no-store" });
    if(!r.ok) return;
    const langs = await r.json();

    // Prefer a plain C (GCC) entry, avoid "C++" and "C#" etc.
    const c = langs.find(x => {
      const n = (x.name || "").toLowerCase();
      return n.includes("c (gcc") || (n === "c");
    }) || langs.find(x => {
      const n = (x.name || "").toLowerCase();
      return n.startsWith("c (") && n.includes("gcc") && !n.includes("c++");
    });

    if(c?.id) C_ID = c.id;
  }catch{}
}

async function run(code, expected, cpuTime=1.0){
  const body = {
    source_code: code,
    language_id: C_ID,
    expected_output: expected,
    redirect_stderr_to_stdout: true,
    cpu_time_limit: cpuTime,
    wall_time_limit: Math.max(2.0, cpuTime + 1.5),

    // C mode + disable warnings
    compiler_options: "-std=c17 -w"
  };

  const r = await fetch(API + "/submissions?wait=true&base64_encoded=false", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if(!r.ok){
    const t = await r.text().catch(()=> "");
    throw new Error("Judge0 request failed: HTTP " + r.status + "\n" + t);
  }
  return await r.json();
}

const challenges = [
  { id: 1, title: "Comma operator vs decimal point (0,1 vs 0.1)", expected: "correct\n", cpu: 1.0,
    starter: `#include <stdio.h>

int main(void){
  int v = 2;

  if (v == 0,1)
    printf("wrong\\n");
  else
    printf("correct\\n");

  return 0;
}`},

  { id: 2, title: "Pointer compare vs string content", expected: "same\n", cpu: 1.0,
    starter: `#include <stdio.h>
#include <string.h>

int main(void){
  char buf[] = "hi";
  const char* s = buf;

  if (s == "hi")
    printf("same\\n");

  return 0;
}`},

  { id: 3, title: "Chained comparisons", expected: "", cpu: 1.0,
    starter: `#include <stdio.h>

int main(void){
  int x = 42;

  if (0 < x < 10)
    printf("in range\\n");

  return 0;
}`},

  { id: 4, title: "Assignment instead of comparison", expected: "", cpu: 1.0,
    starter: `#include <stdio.h>

int main(void){
  int ok = 0;

  if (ok = 1)
    printf("ok\\n");

  return 0;
}`},

  { id: 5, title: "Missing braces", expected: "", cpu: 1.0,
    starter: `#include <stdio.h>

int main(void){
  int isAdmin = 0;

  if (isAdmin)
    printf("allowed\\n");
    printf("logged\\n");

  return 0;
}`},

  { id: 6, title: "sizeof(pointer) vs allocated size", expected: "400\n", cpu: 1.0,
    starter: `#include <stdio.h>
#include <stdlib.h>

int main(void){
  size_t n = 100;
  int* a = (int*)malloc(n * sizeof(int));

  printf("%zu\\n", sizeof(a));

  free(a);
  return 0;
}`},

  { id: 7, title: "memset on int array", expected: "1\n", cpu: 1.0,
    starter: `#include <stdio.h>
#include <string.h>

int main(void){
  int arr[4];

  memset(arr, 1, sizeof(arr));
  printf("%d\\n", arr[0]);

  return 0;
}`},

  { id: 8, title: "Returning pointer to local (dangling)", expected: "42\n", cpu: 1.0,
    starter: `#include <stdio.h>

int* f(void){
  int x = 42;
  return &x;
}

int main(void){
  int* p = f();
  printf("%d\\n", *p);
  return 0;
}`},

  { id: 9, title: "Removing while iterating (skipped element)", expected: "0\n", cpu: 1.0,
    starter: `#include <stdio.h>

int main(void){
  int v[] = {2,4,6,8};
  int n = 4;

  for (int i = 0; i < n; i++){
    if (v[i] % 2 == 0){
      for (int j = i; j < n - 1; j++)
        v[j] = v[j + 1];
      n--;
      i++; // bug: skips next element
    }
  }

  printf("%d\\n", n);
  return 0;
}`},

  { id: 10, title: "Reverse loop with size_t underflow", expected: "3\n2\n1\n", cpu: 0.7,
    starter: `#include <stdio.h>
#include <stddef.h>

int main(void){
  int v[] = {1,2,3};
  size_t n = sizeof(v)/sizeof(v[0]);

  for (size_t i = n - 1; i >= 0; --i)
    printf("%d\\n", v[i]);

  return 0;
}`},
];

function esc(s){
  return (s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

function render(){
  const root = document.getElementById("challenges");
  root.innerHTML = "";
  for(const c of challenges){
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="row">
        <div><b>${c.id}.)</b> ${esc(c.title)}</div>
        <span id="badge-${c.id}" class="pill">Not run</span>
      </div>

      <div class="grid">
        <textarea id="code-${c.id}" spellcheck="false">${esc(c.starter)}</textarea>
        <div class="panel">
          <div class="label">Expected output</div>
          <div class="box">${esc(c.expected === "" ? "(empty)" : c.expected)}</div>

          <div class="label">Last run output / errors</div>
          <div class="box" id="out-${c.id}">—</div>
        </div>
      </div>
    `;
    root.appendChild(div);
  }
}

function setBadge(id, ok, text){
  const b = document.getElementById("badge-" + id);
  b.textContent = text;
  b.className = "pill " + (ok ? "ok" : "bad");
}

async function evaluateAll(){
  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  document.getElementById("status").textContent = "Loading runtime…";

  await getCLangId();
  document.getElementById("status").textContent = `Running (C id=${C_ID}, -std=c17 -w)…`;

  const email = (document.getElementById("email").value || "").trim() || null;
  const started = new Date().toISOString();

  let pass = 0;
  const results = [];

  for(const c of challenges){
    setBadge(c.id, false, "Running…");
    document.getElementById("out-" + c.id).textContent = "Running…";

    const code = document.getElementById("code-" + c.id).value || "";

    try{
      const r = await run(code, c.expected, c.cpu);
      const status = r?.status?.description || ("status_id=" + r?.status_id);
      const ok = (status || "").toLowerCase() === "accepted";
      if(ok) pass++;

      const stdout = r.stdout ?? "";
      const comp = r.compile_output ?? "";
      const msg = r.message ?? "";
      const time = r.time ?? "";
      const mem  = r.memory ?? "";

      document.getElementById("out-" + c.id).textContent =
`Status: ${status}
Time: ${time}s   Memory: ${mem} KB

--- stdout ---
${stdout || "(empty)"}

--- compiler/runtime ---
${comp || "(none)"}

--- message ---
${msg || "(none)"}
`;
      setBadge(c.id, ok, ok ? "PASS" : "FAIL");

      results.push({
        id: c.id,
        title: c.title,
        ok,
        status,
        time,
        memory_kb: mem
      });
    }catch(e){
      document.getElementById("out-" + c.id).textContent = String(e?.message || e);
      setBadge(c.id, false, "ERROR");
      results.push({ id:c.id, title:c.title, ok:false, status:"ERROR", error:String(e?.message || e) });
    }
  }

  const payload = {
    email,
    started_at: started,
    finished_at: new Date().toISOString(),
    judge0_base: API,
    c_language_id: C_ID,
    compiler_options: "-std=c17 -w",
    score: `${pass}/${challenges.length}`,
    results
  };

  document.getElementById("score").textContent = `Score: ${pass}/${challenges.length}`;
  document.getElementById("results").textContent = JSON.stringify(payload, null, 2);
  window.__LAST_PAYLOAD__ = payload;

  document.getElementById("status").textContent = "Done.";
  btn.disabled = false;
}

function copyJSON(){
  const txt = document.getElementById("results").textContent || "";
  navigator.clipboard.writeText(txt);
}

render();
</script>
</body>
</html>
